on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  merge_group:
  pull_request:
    branches:
      - "*"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv and set Python version
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.2"
          python-version: "3.13"
          enable-cache: true # zizmor: ignore[cache-poisoning] CI-only, no artifacts published
      - name: Install dependencies
        run: uv sync --locked
      - name: Run Ruff
        run: uv run --frozen ruff check .

  type-checking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv and set Python version
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.2"
          python-version: "3.13"
          enable-cache: true # zizmor: ignore[cache-poisoning] CI-only, no artifacts published
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5.0.4 # zizmor: ignore[cache-poisoning]
        name: Cache mypy cache
        with:
          path: ./.mypy_cache
          key: mypy-${{ hashFiles('**/*.py', 'pyproject.toml') }}
          restore-keys: |
            mypy-
      - name: Install dependencies
        run: uv sync --locked
      - name: Run mypy type checking
        run: uv run --frozen mypy agentinsight --no-error-summary

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AGENTINSIGHT_BASE_URL: "http://localhost:3000"
      AGENTINSIGHT_PUBLIC_KEY: "pk-lf-test"
      AGENTINSIGHT_SECRET_KEY: "sk-lf-test"
      OPENAI_API_KEY: "test-openai-key"
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    name: Unit tests on Python ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv and set Python version
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.2"
          python-version: ${{ matrix.python-version }}
          enable-cache: true # zizmor: ignore[cache-poisoning] CI-only, no artifacts published

      - name: Check Python version
        run: python --version

      - name: Install the project dependencies
        run: uv sync --locked

      - name: Run the automated tests
        run: |
          python --version
          uv run --frozen pytest -n auto --dist worksteal -s -v --log-cli-level=INFO tests/unit

  all-tests-passed:
    runs-on: ubuntu-latest
    needs: [unit-tests, linting, type-checking]
    if: always()
    steps:
      - name: Successful deploy
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: exit 0
      - name: Failing deploy
        if: ${{ contains(needs.*.result, 'failure') }}
        run: exit 1
